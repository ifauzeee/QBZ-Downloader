name: Tests

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  test:
    runs-on: ${{ matrix.os }}

    strategy:
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]
        node-version: [20.x, 22.x]
        exclude:
          - os: windows-latest
            node-version: 20.x

    steps:
    - uses: actions/checkout@v4

    - name: Cache node-gyp cache
      uses: actions/cache@v4
      with:
        path: |
          ~/.cache/node-gyp
          ~\AppData\Local\node-gyp\cache
        key: node-gyp-${{ matrix.os }}-${{ matrix.node-version }}-${{ hashFiles('package-lock.json') }}
        restore-keys: |
          node-gyp-${{ matrix.os }}-${{ matrix.node-version }}-
          node-gyp-${{ matrix.os }}-

    - name: Use Node.js ${{ matrix.node-version }}
      uses: actions/setup-node@v4
      with:
        node-version: ${{ matrix.node-version }}
        cache: 'npm'
        cache-dependency-path: |
          package-lock.json
          client/package-lock.json
    
    - name: Install dependencies
      run: npm ci

    - name: Audit root dependencies
      run: npm audit --audit-level=high

    - name: Lint
      run: npm run lint

    - name: Type Check
      run: npx tsc --noEmit

    - name: Run Tests
      run: npm test

    - name: Install client dependencies
      run: npm ci
      working-directory: client

    - name: Audit client dependencies
      run: npm audit --audit-level=high
      working-directory: client

    - name: Lint client
      run: npm run lint
      working-directory: client

    - name: Build client
      run: npm run build
      working-directory: client

    - name: Run client tests
      run: npm test
      working-directory: client

    - name: Electron smoke test (Windows, merge-to-main only)
      if: runner.os == 'Windows' && github.event_name == 'push' && github.ref == 'refs/heads/main'
      run: npm run build:full && node tests/electron-smoke.mjs
      env:
        NODE_ENV: test
