name: Desktop Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

jobs:
  windows-release:
    runs-on: windows-latest
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build full project
        run: npm run build:full

      - name: Publish to GitHub Releases (tag only)
        if: startsWith(github.ref, 'refs/tags/v')
        run: npx electron-builder --win nsis portable --publish always
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Build artifacts only (manual dispatch)
        if: ${{ !startsWith(github.ref, 'refs/tags/v') }}
        run: npx electron-builder --win nsis portable --publish never

      - name: Upload build artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: qbz-desktop-release
          path: |
            release/*.exe
            release/*.yml
            release/*.blockmap
