name: Feature Request
description: Suggest a new feature or improvement for QBZ Downloader
title: "[Feature]: "
labels: ["enhancement"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for suggesting an idea! Please describe your request below.
  - type: textarea
    id: problem
    attributes:
      label: Problem Statement
      description: What problem would this feature solve? What are you trying to accomplish?
    validations:
      required: true
  - type: textarea
    id: solution
    attributes:
      label: Proposed Solution
      description: Describe the feature or behavior you'd like to see.
    validations:
      required: true
  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives Considered
      description: Any alternative solutions or features you've thought about?
  - type: dropdown
    id: area
    attributes:
      label: Area
      description: Which part of the app does this relate to?
      options:
        - Download engine
        - Metadata / tagging
        - Library / scanner
        - Desktop app (Electron)
        - Web UI / client
        - CI / build / packaging
        - Other
    validations:
      required: true
