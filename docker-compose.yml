services:
  qbz-web:
    build:
      context: .
      dockerfile: Dockerfile
      args:
        - PUID=${PUID:-1000}
        - PGID=${PGID:-1000}
    container_name: qbz-web
    restart: unless-stopped
    environment:
      - NODE_ENV=production
      - SQLITE_JOURNAL_MODE=WAL

    volumes:
      - ./downloads:/app/downloads
      - ./data:/app/data
    ports:
      - "3000:3000"
    networks:
      - qbz-network

networks:
  qbz-network:
    driver: bridge

volumes:
  downloads:
  data:
